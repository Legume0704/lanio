<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lanio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #16213e;
      border-radius: 12px;
      padding: 2.5rem;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    h1 { font-size: 1.8rem; margin-bottom: 0.5rem; color: #fff; }
    .subtitle { color: #888; margin-bottom: 2rem; }
    h2 { font-size: 1rem; text-transform: uppercase; letter-spacing: 0.05em; color: #888; margin-bottom: 0.75rem; }
    .url-box {
      background: #0f3460;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-family: monospace;
      font-size: 0.9rem;
      word-break: break-all;
      margin-bottom: 1.5rem;
      color: #a8d8ea;
    }
    .steps { margin-bottom: 2rem; }
    .step {
      display: flex;
      gap: 1rem;
      margin-bottom: 0.75rem;
      align-items: flex-start;
    }
    .step-num {
      background: #533483;
      color: #fff;
      border-radius: 50%;
      width: 1.6rem;
      height: 1.6rem;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: bold;
    }
    .step-text { padding-top: 0.15rem; line-height: 1.5; }
    .btn {
      display: inline-block;
      background: #533483;
      color: #fff;
      text-decoration: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn:hover { background: #6a42a8; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Lanio</h1>
    <p class="subtitle">Stream your local media files in Stremio</p>

    <h2>Manifest URL</h2>
    <div class="url-box">{{ manifest_url }}</div>

    <h2>How to Install</h2>
    <div class="steps">
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-text">Open Stremio and click the <strong>puzzle icon</strong> (Add-ons) in the top right</div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-text">Click <strong>Community Add-ons</strong> at the bottom of the page</div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-text">Paste the manifest URL above and click <strong>Install</strong></div>
      </div>
    </div>

    <a href="{{ install_url }}" class="btn">Install in Stremio Web</a>
  </div>
</body>
</html>
